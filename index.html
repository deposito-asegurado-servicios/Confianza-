<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultar Guía - Depósito Asegurado</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #1a4d32 0%, #0d2b1c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px 20px;
            border-radius: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .header-image {
            width: 100%;
            border-radius: 25px;
            margin-bottom: 10px;
            display: block;
        }

        h1 {
            font-size: 2.2rem;
            margin: 10px 0;
            font-weight: 700;
        }

        p {
            color: #d0d0d0;
            font-size: 1rem;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            border: none;
            background-color: #f0f4f8;
            box-sizing: border-box;
            font-size: 1rem;
            margin-bottom: 12px;
            outline: none;
            color: #333;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            border: none;
            font-weight: bold;
            font-size: 1.05rem;
            cursor: pointer;
            margin-bottom: 10px;
            transition: all 0.3s ease;
            display: block;
            text-decoration: none;
            text-align: center;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background-color: #00ff85;
            color: #0d2b1c;
        }

        .btn-secondary {
            background: linear-gradient(90deg, #187a71, #25a093);
            color: white;
        }

        .footer-text {
            color: #8da397;
            font-size: 0.85rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://photos.app.goo.gl/SNbNe1a927AW7EvS9" alt="Servicio de Entrega" class="header-image">

    <h1>Consultar guía</h1>
    <p>Consulta el estado de tu envío con depósito asegurado</p>

    <div class="input-group">
        <input type="text" id="numGuia" placeholder="Ingresa número de guía">
        <input type="text" id="destino" placeholder="Ingresa la dirección de destino">
    </div>

    <button class="btn btn-primary" onclick="validarGuia()">Consultar Guía</button>
    
    <button class="btn btn-secondary" onclick="irAlChatBot()">Chat Bot</button>
    
    <a href="https://www.facebook.com/share/18QBj4DqTC/" target="_blank" class="btn btn-secondary">
        Conoce más sobre nosotros
    </a>

    <div class="footer-text">
        Servicio exclusivo depósito asegurado
    </div>
</div>

<script>
    function validarGuia() {
        const guiaInput = document.getElementById('numGuia').value.trim();
        const codigoValido = "0750925931";
        const telefonoWhatsApp = "573026219839";

        if (guiaInput === codigoValido) {
            const mensaje = encodeURIComponent("Hola, mi número de guía es " + codigoValido + ". Deseo consultar mi envío.");
            window.location.href = "https://wa.me/" + telefonoWhatsApp + "?text=" + mensaje;
        } else if (guiaInput === "") {
            alert("Por favor, ingresa el número de guía.");
        } else {
            alert("Número de guía no reconocido. Por favor, verifica el código.");
        }
    }

    function irAlChatBot() {
        window.location.href = "https://site-c95oe23k0.godaddysites.com/";
    }
</script>

</body>
</html>
